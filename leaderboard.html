<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora Leaderboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #121a2a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 15px;
      text-align: left;
    }

    th {
      background: #1c2740;
      color: #00d4ff;
      text-transform: uppercase;
      font-size: 13px;
    }

    tr {
      border-bottom: 1px solid #1f2a44;
    }

    tr:hover {
      background: #18233a;
    }

    .rank {
      font-weight: bold;
      color: gold;
    }

    .user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #00c6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    .score {
      color: #00ff9d;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 15px;
      color: #555;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      th, td {
        padding: 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

<header>
  🏆 NEXORA LEADERBOARD
</header>

<div class="container">
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Player</th>
          <th>Level</th>
          <th>NXR</th>
        </tr>
      </thead>
      <tbody>

        <tr>
          <td class="rank">1</td>
          <td>
            <div class="user">
              <div class="avatar">A</div>
              Alex Miner
            </div>
          </td>
          <td>Lv. 45</td>
          <td class="score">12,450 NXR</td>
        </tr>

        <tr>
          <td class="rank">2</td>
          <td>
            <div class="user">
              <div class="avatar">B</div>
              Block King
            </div>
          </td>
          <td>Lv. 42</td>
          <td class="score">11,120 NXR</td>
        </tr>

        <tr>
          <td class="rank">3</td>
          <td>
            <div class="user">
              <div class="avatar">C</div>
              CryptoZ
            </div>
          </td>
          <td>Lv. 40</td>
          <td class="score">10,300 NXR</td>
        </tr>

        <tr>
          <td>4</td>
          <td>
            <div class="user">
              <div class="avatar">D</div>
              Nex Player
            </div>
          </td>
          <td>Lv. 38</td>
          <td class="score">9,210 NXR</td>
        </tr>

      </tbody>
    </table>
  </div>
</div>

<footer>
  Nexora System © 2026 - Blockchain Game Economy
</footer>

</body>
</html>

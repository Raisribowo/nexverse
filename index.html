<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora - Auth System</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0,255,255,0.2);
    }

    .logo {
      text-align: center;
      font-size: 34px;
      color: #00ffff;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ffff;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .toggle {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toggle button {
      flex: 1;
      padding: 10px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      color: white;
      transition: 0.3s;
    }

    .toggle button.active {
      background: #00ffff;
      color: black;
    }

    .input-box {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg,#00ffff,#2563eb);
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #00ff99;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">NEXORA</div>
  <div class="subtitle">Login & Register System</div>

  <div class="toggle">
    <button id="btnReg" class="active" onclick="show('register')">Register</button>
    <button id="btnLogin" onclick="show('login')">Login</button>
  </div>

  <!-- REGISTER -->
  <div id="registerBox">
    <div class="input-box"><input id="r_user" placeholder="Username"></div>
    <div class="input-box"><input id="r_email" placeholder="Email"></div>
    <div class="input-box"><input id="r_pass" type="password" placeholder="Password"></div>
    <button class="btn" onclick="register()">DAFTAR</button>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" class="hidden">
    <div class="input-box"><input id="l_email" placeholder="Email"></div>
    <div class="input-box"><input id="l_pass" type="password" placeholder="Password"></div>
    <button class="btn" onclick="login()">LOGIN</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
function show(type){
  document.getElementById('registerBox').classList.add('hidden');
  document.getElementById('loginBox').classList.add('hidden');

  document.getElementById('btnReg').classList.remove('active');
  document.getElementById('btnLogin').classList.remove('active');

  if(type==='register'){
    document.getElementById('registerBox').classList.remove('hidden');
    document.getElementById('btnReg').classList.add('active');
  }else{
    document.getElementById('loginBox').classList.remove('hidden');
    document.getElementById('btnLogin').classList.add('active');
  }
}

function getUsers(){
  return JSON.parse(localStorage.getItem('nexoraUsers')||'[]');
}

function saveUsers(u){
  localStorage.setItem('nexoraUsers',JSON.stringify(u));
}

function register(){
  let users=getUsers();

  let user={
    id:'NXR-'+Math.floor(Math.random()*900000),
    username:document.getElementById('r_user').value,
    email:document.getElementById('r_email').value,
    password:document.getElementById('r_pass').value,
    balance:0
  };

  users.push(user);
  saveUsers(users);

  document.getElementById('msg').innerText="Register sukses ID: "+user.id;
}

function login(){
  let users=getUsers();

  let email=document.getElementById('l_email').value;
  let pass=document.getElementById('l_pass').value;

  let found=users.find(u=>u.email===email && u.password===pass);

  if(found){
    localStorage.setItem('currentUser',JSON.stringify(found));
    document.getElementById('msg').innerText="Login sukses: "+found.username;

    setTimeout(()=>{
      window.location.href="dashboard.html";
    },1000);
  }else{
    document.getElementById('msg').innerText="Login gagal";
  }
}
</script>

</body>
</html>

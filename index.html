  /* ===== SIDEBAR ===== */

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#070b1a;
    color:white;
}

/* Sidebar */

.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;

    background:rgba(10,15,35,0.95);

    border-right:1px solid rgba(0,255,255,0.3);

    box-shadow:0 0 25px rgba(0,255,255,0.2);

    backdrop-filter:blur(10px);

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:20px;
}

/* Logo */

.logo h2{
    margin:0;
    font-size:28px;
    color:#00ffff;

    text-shadow:0 0 10px cyan;
}

.logo span{
    font-size:12px;
    color:#7aa2ff;
}

/* Menu */

.menu{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* Button */

.menu-btn{
    background:rgba(255,255,255,0.05);

    border:1px solid rgba(0,255,255,0.2);

    color:white;

    padding:14px;

    border-radius:15px;

    cursor:pointer;

    font-size:16px;

    text-align:left;

    transition:0.3s;

    display:flex;
    align-items:center;
    gap:10px;
}

/* Hover */

.menu-btn:hover{
    background:rgba(0,255,255,0.15);

    transform:translateX(5px);

    box-shadow:0 0 15px cyan;
}

/* Active Menu */

.menu-btn.active{
    background:linear-gradient(
        90deg,
        rgba(0,255,255,0.3),
        rgba(0,100,255,0.3)
    );

    border:1px solid cyan;

    box-shadow:0 0 20px cyan;
}

/* Player Box */

.player-box{
    background:rgba(255,255,255,0.05);

    border:1px solid rgba(0,255,255,0.2);

    border-radius:20px;

    padding:15px;

    text-align:center;
}

/* Avatar */

style="background:white;color:black">

<div id="gamePage">

  <div style="
text-align:right;
font-size:12px;
">

<div>

1000000
</span>
NXR
</div>

</span>
NXR
</div>

<div>

<span id="minedSupply">
0
</span>
NXR
</div>

</div>
<h2>NEXORA PRO</h2>

</div>

<div class="menu">

</div>

</div>

🛠 Durability:
<span id="durability">100</span>%
</div>

🖥 Rig Level:
<span id="rigLevel">1</span>
</div>

<button
class="action"
onclick="repairRig()">

🛠 Repair Rig

</button>

<button class="action" onclick="mine()">MINE</button>

</div>

<script>

// ================= FIREBASE CONFIG =================
const firebaseConfig = {

  apiKey: "AIzaSyC5L5hxVSYOl_R5NH3Dnm-ta0L9pkfDN_w",

  authDomain: "nexora-35f82.firebaseapp.com",

  databaseURL:
  "https://nexora-35f82-default-rtdb.firebaseio.com",

  projectId: "nexora-35f82",

  storageBucket:
  "nexora-35f82.appspot.com",

  messagingSenderId: "10460502194",

  appId:
  "1:10460502194:web:5f00eb22b1caf2519191ab"

};

// ================= INIT FIREBASE =================
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const auth = firebase.auth();
  
  // ================= VARIABLES =================
let playerId = null;
let playerName = "Player";
let nxr = 0;
let power = 1;
let level = 1;

  // ================= GLOBAL MARKET =================
let totalSupply = 2100000;

let minedSupply = 0;

let remainingSupply = totalSupply;

  //================= NEW VARIABLES================
  let balance = 1000;

let electricity = 0;

let durability = 100;

let rigLevel = 1;

let rentCost = 50;

// ================= LOGIN GOOGLE =================
function loginGoogle(){

const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)
.then(res=>{

playerId = res.user.uid;
playerName = res.user.displayName;

startGame();

});

}

// ================= REGISTER EMAIL =================
function registerEmail(){

auth.createUserWithEmailAndPassword(
email.value,
password.value
)
.then(res=>{

playerId = res.user.uid;
playerName = res.user.email;

startGame();

});

}

// ================= LOGIN EMAIL =================
function loginEmail(){

auth.signInWithEmailAndPassword(
email.value,
password.value
)
.then(res=>{

playerId = res.user.uid;
playerName = res.user.email;

startGame();

});

}

// ================= START GAME =================
function startGame(){

document.getElementById("loginPage").style.display="none";
document.getElementById("gamePage").style.display="block";

document.getElementById("playerName").innerText = playerName;

loadPlayer();
loadMarket();
}

// ================= LOAD PLAYER =================
function loadPlayer(){
  balance = d.balance || 1000;

electricity =
d.electricity || 0;

durability =
d.durability || 100;

rigLevel =
d.rigLevel || 1;

db.ref("players/"+playerId).once("value")
.then(snap=>{

if(snap.exists()){

let d = snap.val();

nxr = d.nxr;
power = d.power;
level = d.level;

}

updateUI();

});

}

  // ================= LOAD MARKET =================
function loadMarket(){

db.ref("market")

.on("value",(snap)=>{

if(snap.exists()){

const data = snap.val();

minedSupply =
data.minedSupply || 0;

remainingSupply =
data.remainingSupply || totalSupply;

updateUI();

}

});

}


// ================= MINE =================
function mine(){

nxr += power;
updateUI();

}

// ================= UI UPDATE =================
function updateUI(){document.getElementById(
"totalSupply"
).innerText =
Math.floor(totalSupply);

document.getElementById(
"remainingSupply"
).innerText =
Math.floor(remainingSupply);

document.getElementById(
"minedSupply"
).innerText =
Math.floor(minedSupply);

document.getElementById(
"nxr"
).innerText = nxr;

document.getElementById(
"power"
).innerText = power;

document.getElementById(
"level"
).innerText = level;

document.getElementById(
"balance"
).innerText =
balance.toFixed(2);

document.getElementById(
"electricity"
).innerText =
electricity.toFixed(2);

document.getElementById(
"durability"
).innerText =
durability.toFixed(1);

document.getElementById(
"rigLevel"
).innerText =
rigLevel;

}
  // ================= AUTO MINING =================
setInterval(()=>{

if(playerId && durability > 0){

let mined = power * 0.1;

nxr += mined;
  minedSupply += mined;

remainingSupply =
totalSupply - minedSupply;

let electricCost =
power * 0.02;

balance -= electricCost;

durability -= 0.05;

electricity += electricCost;

updateUI();

savePlayer();

}

},1000);

  // ================= REPAIR RIG =================
function repairRig(){

if(balance >= 100){

balance -= 100;

durability = 100;

alert("Rig repaired");

updateUI();

savePlayer();

}else{

alert("Balance not enough");

}

}

  // ================= AUTO SAVE =================
function savePlayer(){

// SAVE PLAYER
db.ref("players/"+playerId).set({

name:playerName,

nxr:nxr,

power:power,

level:level,

balance:balance,

electricity:electricity,

durability:durability,

rigLevel:rigLevel,

online:true

});

// SAVE GLOBAL MARKET
db.ref("market").update({

minedSupply:minedSupply,

remainingSupply:remainingSupply

});

}

// ================= LOGOUT =================
function logout(){

auth.signOut().then(()=>{

location.reload();

});

}

</script>

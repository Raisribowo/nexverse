<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nexora v1</title>

<!-- FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1020;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:#11182d;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.logo{
font-size:24px;
font-weight:700;
color:#00f5ff;
}

.user-status{
font-size:14px;
color:#00ff88;
}

/* DASHBOARD */

.dashboard{
padding:20px;
}

.balance-card{
background:linear-gradient(135deg,#16213e,#1f4068);
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,255,255,0.1);
}

.balance-title{
font-size:14px;
opacity:0.8;
margin-bottom:10px;
}

.balance{
font-size:36px;
font-weight:700;
color:#00f5ff;
}

.balance-usd{
margin-top:8px;
font-size:14px;
opacity:0.7;
}

/* MINING CARD */

.mining-card{
background:#151d35;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.mining-title{
font-size:18px;
margin-bottom:15px;
}

.mining-status{
margin-bottom:15px;
color:#00ff88;
}

.mine-btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#00f5ff;
color:black;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.mine-btn:hover{
transform:scale(1.02);
}

/* STATS */

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.stat-box{
background:#151d35;
padding:20px;
border-radius:20px;
text-align:center;
}

.stat-title{
font-size:13px;
opacity:0.7;
margin-bottom:8px;
}

.stat-value{
font-size:20px;
font-weight:600;
color:#00f5ff;
}

/* MENU */

.bottom-menu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#11182d;
display:flex;
justify-content:space-around;
padding:15px 0;
border-top:1px solid rgba(255,255,255,0.05);
}

.menu-item{
text-align:center;
font-size:12px;
color:white;
cursor:pointer;
}

.menu-item span{
display:block;
font-size:22px;
margin-bottom:5px;
}

/* LOGIN */

.login-page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b1020;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.login-box{
width:90%;
max-width:350px;
background:#151d35;
padding:30px;
border-radius:20px;
}

.login-title{
text-align:center;
font-size:24px;
margin-bottom:20px;
color:#00f5ff;
}

.input-box{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1f2947;
color:white;
}

.login-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00f5ff;
color:black;
font-weight:600;
cursor:pointer;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div class="login-page" id="loginPage">

<div class="login-box">

<div class="login-title">
NEXORA
</div>

<input type="email" id="email" class="input-box" placeholder="Email">

<input type="password" id="password" class="input-box" placeholder="Password">

<button class="login-btn" onclick="login()">
LOGIN
</button>

</div>

</div>

<!-- HEADER -->

<header>

<div class="logo">
NEXORA
</div>

<div class="user-status">
● ONLINE
</div>

</header>

<!-- DASHBOARD -->

<div class="dashboard">

<!-- BALANCE -->

<div class="balance-card">

<div class="balance-title">
TOTAL BALANCE
</div>

<div class="balance" id="balance">
0 NXR
</div>

<div class="balance-usd">
≈ $0.00 USD
</div>

</div>

<!-- MINING -->

<div class="mining-card">

<div class="mining-title">
Mining Rig
</div>

<div class="mining-status" id="miningStatus">
Status : Idle
</div>

<button class="mine-btn" onclick="startMining()">
START MINING
</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-box">
<div class="stat-title">
Hash Power
</div>
<div class="stat-value">
1.2 GH/s
</div>
</div>

<div class="stat-box">
<div class="stat-title">
Rig Level
</div>
<div class="stat-value">
Lv 1
</div>
</div>

</div>

</div>

<!-- MENU -->

<div class="bottom-menu">

<div class="menu-item">
<span>🏠</span>
Home
</div>

<div class="menu-item">
<span>⛏️</span>
Mining
</div>

<div class="menu-item">
<span>💰</span>
Wallet
</div>

<div class="menu-item">
<span>📈</span>
Market
</div>

<div class="menu-item">
<span>👤</span>
Profile
</div>
<button onclick="logout()">🚪 Logout</button>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyC5L5hxVSYOl_R5NH3Dnm-ta0L9pkfDN_w",
  authDomain: "nexora-35f82.firebaseapp.com",

  databaseURL: "https://nexora-35f82-default-rtdb.asia-southeast1.firebasedatabase.app",

  projectId: "nexora-35f82",
  storageBucket: "nexora-35f82.firebasestorage.app",
  messagingSenderId: "10460502194",
  appId: "1:10460502194:web:5f00eb22b1caf2519191ab",
  measurementId: "G-9BBWJS1GDS"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* =========================
   DATA PLAYER
========================= */

let currentUser = null;

let playerData = {

nxr: 0,
balance: 1000,
mining: false,
level: 1

};

/* =========================
   NAVIGATION
========================= */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{

p.style.display = "none";

});

document.getElementById(page + "Page").style.display = "block";

}

/* =========================
   REGISTER
========================= */

function registerEmail(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(password.lengthscri

alert("Password minimal 6 karakter");
return;

}

auth.createUserWithEmailAndPassword(email,password)

.then((userCredential)=>{

currentUser = userCredential.user;

db.ref("users/" + currentUser.uid).set({

email: email,
nxr: 0,
balance: 1000,
level: 1

});

alert("Register berhasil");

})

.catch((error)=>{

alert(error.message);

});

}

/* =========================
   LOGIN
========================= */

function loginEmail(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)

.then((userCredential)=>{

currentUser = userCredential.user;

alert("Login berhasil");

})

.catch((error)=>{

alert(error.message);

});

}

/* =========================
   AUTO LOGIN
========================= */

auth.onAuthStateChanged((user)=>{

if(user){

currentUser = user;

document.getElementById("loginPage").style.display = "none";

showPage("home");

loadPlayerData();

}else{

document.getElementById("loginPage").style.display = "flex";

}

});

/* =========================
   LOAD DATA
========================= */

function loadPlayerData(){

db.ref("users/" + currentUser.uid)

.on("value",(snapshot)=>{

if(snapshot.exists()){

playerData = snapshot.val();

updateUI();

}

});

}

/* =========================
   UPDATE UI
========================= */

function updateUI(){

document.getElementById("nxr").innerText =
playerData.nxr;

document.getElementById("balance").innerText =
playerData.balance;

document.getElementById("balance2").innerText =
playerData.balance;

document.getElementById("playerName").innerText =
currentUser.email;

}

/* =========================
   SAVE DATA
========================= */

function saveData(){

db.ref("users/" + currentUser.uid)

.update({

nxr: playerData.nxr,
balance: playerData.balance,
level: playerData.level

});

}

/* =========================
   MINING SYSTEM
========================= */

function mine(){

if(playerData.balance <= 0){

alert("Balance habis");
return;

}

playerData.nxr += 1;
playerData.balance -= 1;

updateUI();
saveData();

}

/* =========================
   AUTO MINING
========================= */

setInterval(()=>{

if(currentUser){

playerData.nxr += 1;

updateUI();
saveData();

}

},5000);

/* =========================
   LOGOUT
========================= */

function logout(){

auth.signOut();

}

/* =========================
   START PAGE
========================= */

showPage("home");

</script>

<!DOCTYPE html>
<html>
<head>
  <title>Nexora App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: white;
    }

    .header {
      background: #161b22;
      padding: 15px;
      text-align: center;
      color: #00ff99;
      font-size: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #161b22;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #00ff99;
      color: black;
      font-size: 16px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="header">🚀 Nexora Mining App</div>

  <div class="container">

    <!-- LOGIN -->
    <div class="card" id="loginBox">
      <h3>Login Player</h3>
      <input id="nama" placeholder="Masukkan Nama / ID">
      <button onclick="login()">Masuk</button>
    </div>

    <!-- GAME -->
    <div id="gameBox" class="hidden">

      <div class="card">
        <h3>Player: <span id="player"></span></h3>
        <h2 id="saldo">0 NXR</h2>
      </div>

      <div class="card">
        <h3>Mining</h3>
        <p>Power: <span id="power">1</span></p>
        <button onclick="mine()">⛏️ Mining</button>
      </div>

      <div class="card">
        <h3>Level</h3>
        <p>Level: <span id="level">1</span></p>
      </div>

      <div class="card">
        <h3>Upgrade</h3>
        <p>Cost: <span id="cost">10</span> NXR</p>
        <button onclick="upgrade()">Upgrade Skill</button>
      </div>

      <div class="card">
        <button onclick="logout()">Logout</button>
      </div>

    </div>

  </div>

  <script>
    let player = localStorage.getItem("player");

    let saldo = 0;
    let level = 1;
    let power = 1;

    function login() {
      player = document.getElementById("nama").value;

      if (!player) {
        alert("Isi nama dulu!");
        return;
      }

      localStorage.setItem("player", player);

      loadData();
      showGame();
    }

    function loadData() {
      saldo = parseInt(localStorage.getItem(player+"_saldo")) || 0;
      level = parseInt(localStorage.getItem(player+"_level")) || 1;
      power = parseInt(localStorage.getItem(player+"_power")) || 1;
    }

    function saveData() {
      localStorage.setItem(player+"_saldo", saldo);
      localStorage.setItem(player+"_level", level);
      localStorage.setItem(player+"_power", power);
    }

    function showGame() {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("gameBox").classList.remove("hidden");

      document.getElementById("player").innerText = player;

      updateUI();
    }

    function mine() {
      saldo += power;

      if (saldo >= level * 20) {
        level++;
      }

      saveData();
      updateUI();
    }

    function upgrade() {
      let cost = power * 10;

      if (saldo >= cost) {
        saldo -= cost;
        power++;
      } else {
        alert("NXR tidak cukup!");
      }

      saveData();
      updateUI();
    }

    function updateUI() {
      document.getElementById("saldo").innerText = saldo + " NXR";
      document.getElementById("level").innerText = level;
      document.getElementById("power").innerText = power;
      document.getElementById("cost").innerText = power * 10;
    }

    function logout() {
      localStorage.removeItem("player");
      location.reload();
    }

    // AUTO LOGIN
    if (player) {
      loadData();
      showGame();
    }
  </script>

</body>
</html>

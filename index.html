<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Pro Stable</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#070b1a;
    color:white;
}

/* LOGIN */
#loginPage{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

input{
    width:80%;
    max-width:300px;
    padding:12px;
    margin:6px;
    border-radius:10px;
    border:none;
}

/* GAME */
#gamePage{
    display:none;
    padding:20px;
    margin-left:260px;
}

.card{
    background:#11182d;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.action{
    background:#00bfff;
    color:black;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:#0b1020;
    padding:15px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>NEXORA</h2>
<p>Crypto Mining</p>
</div>

<!-- LOGIN -->
<div id="loginPage">

<h2>NEXORA LOGIN</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="action" onclick="loginEmail()">Login</button>
<button class="action" onclick="registerEmail()">Register</button>
<button class="action" onclick="loginGoogle()" style="background:white;color:black">Google</button>

</div>

<!-- GAME -->
<div id="gamePage">

<h2>NEXORA PRO STABLE</h2>

<p>Player: <span id="playerName">-</span></p>

<div class="card">NXR: <span id="nxr">0</span></div>
<div class="card">Balance: <span id="balance">1000</span></div>
<div class="card">Power: <span id="power">1</span></div>
<div class="card">Durability: <span id="durability">100</span></div>

<button class="action" onclick="mine()">⛏ Mine</button>
<button onclick="logout()">Logout</button>

</div>

<script>

// ================= FIREBASE CONFIG =================
const firebaseConfig = {
  apiKey: "AIzaSyC5L5hxVSYOl_R5NH3Dnm-ta0L9pkfDN_w",
  authDomain: "nexora-35f82.firebaseapp.com",
  databaseURL: "https://nexora-35f82-default-rtdb.firebaseio.com",
  projectId: "nexora-35f82",
  storageBucket: "nexora-35f82.appspot.com",
  messagingSenderId: "10460502194",
  appId: "1:10460502194:web:5f00eb22b1caf2519191ab"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

// ================= VARIABLES =================
let playerId = null;
let playerName = "Player";
let nxr = 0;
let power = 1;
let balance = 1000;
let durability = 100;

// ================= AUTO SESSION =================
auth.onAuthStateChanged(user => {
    if (user) {
        playerId = user.uid;
        playerName = user.displayName || user.email;

        startGame();
    } else {
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("gamePage").style.display = "none";
    }
});

// ================= LOGIN GOOGLE =================
function loginGoogle(){
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(res=>{
        playerId = res.user.uid;
        playerName = res.user.displayName || "Player";
        startGame();
    })
    .catch(err=>{
        alert(err.message);
    });
}

// ================= REGISTER =================
function registerEmail(){
auth.createUserWithEmailAndPassword(email.value, password.value)
.then(res=>{
    playerId = res.user.uid;
    playerName = res.user.email;
    startGame();
})
.catch(err=>{
    alert(err.message);
});
}

// ================= LOGIN =================
function loginEmail(){
auth.signInWithEmailAndPassword(email.value, password.value)
.then(res=>{
    playerId = res.user.uid;
    playerName = res.user.email;
    startGame();
})
.catch(err=>{
    alert(err.message);
});
}

// ================= START GAME =================
function startGame(){

document.getElementById("loginPage").style.display = "none";
document.getElementById("gamePage").style.display = "block";

document.getElementById("playerName").innerText = playerName;

loadPlayer();

}

// ================= LOAD PLAYER =================
function loadPlayer(){
db.ref("players/"+playerId).once("value")
.then(snap=>{
    if(snap.exists()){
        let d = snap.val();
        nxr = d.nxr || 0;
        power = d.power || 1;
        balance = d.balance || 1000;
        durability = d.durability || 100;
    }
    updateUI();
});
}

// ================= MINE =================
function mine(){
if(durability <= 0){
    alert("Rig rusak");
    return;
}

nxr += power;
balance -= 1;
durability -= 0.5;

updateUI();
savePlayer();
}

// ================= UI =================
function updateUI(){
document.getElementById("nxr").innerText = nxr.toFixed(2);
document.getElementById("balance").innerText = balance.toFixed(2);
document.getElementById("power").innerText = power;
document.getElementById("durability").innerText = durability.toFixed(1);
}

// ================= SAVE =================
function savePlayer(){
db.ref("players/"+playerId).set({
    nxr,
    power,
    balance,
    durability,
    name:playerName
});
}

// ================= LOGOUT =================
function logout(){
auth.signOut();
location.reload();
}

</script>

</body>
</html>

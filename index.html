<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
    button { padding: 15px; width: 100%; margin: 10px 0; border: none; border-radius: 10px; background: #2ea6ff; color: white; font-size: 16px; }
    .stats { background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>⛏️ Mining Rig</h2>
  <div class="stats">
    <p>Token: <span id="balance">0</span> NEX</p>
    <p>Hash Rate: <span id="hash">1</span> H/s</p>
  </div>
  <button onclick="claim()">Claim Token</button>
  <button onclick="upgrade()">Upgrade Rig - 500 NEX</button>

  <script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    function claim() {
      tg.sendData(JSON.stringify({action: "claim"}));
      alert("Token diklaim!");
    }
    
    function upgrade() {
      tg.sendData(JSON.stringify({action: "upgrade"}));
      alert("Upgrade diminta!");
    }
  </script>
</body>
</html>

  <script>
    let player = localStorage.getItem("player");

    let saldo = 0;
    let level = 1;
    let power = 1;

    function login() {
      player = document.getElementById("nama").value;

      if (!player) {
        alert("Isi nama dulu!");
        return;
      }

      localStorage.setItem("player", player);

      loadData();
      showGame();
    }

    function loadData() {
      saldo = parseInt(localStorage.getItem(player+"_saldo")) || 0;
      level = parseInt(localStorage.getItem(player+"_level")) || 1;
      power = parseInt(localStorage.getItem(player+"_power")) || 1;
    }

    function saveData() {
      localStorage.setItem(player+"_saldo", saldo);
      localStorage.setItem(player+"_level", level);
      localStorage.setItem(player+"_power", power);
    }

    function showGame() {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("gameBox").classList.remove("hidden");

      document.getElementById("player").innerText = player;

      updateUI();
    }

    function mine() {
      saldo += power;

      if (saldo >= level * 20) {
        level++;
      }

      saveData();
      updateUI();
    }

    function upgrade() {
      let cost = power * 10;

      if (saldo >= cost) {
        saldo -= cost;
        power++;
      } else {
        alert("NXR tidak cukup!");
      }

      saveData();
      updateUI();
    }

    function updateUI() {
      document.getElementById("saldo").innerText = saldo + " NXR";
      document.getElementById("level").innerText = level;
      document.getElementById("power").innerText = power;
      document.getElementById("cost").innerText = power * 10;
    }

    function logout() {
      localStorage.removeItem("player");
      location.reload();
    }

    // AUTO LOGIN
    if (player) {
      loadData();
      showGame();
    }
  </script>

</body>

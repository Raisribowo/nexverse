<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Pro</title>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#070b1a;
    color:white;
}

/* ================= LOGIN ================= */

#loginPage{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

input{
    width:80%;
    max-width:300px;
    padding:12px;
    margin:6px;
    border:none;
    border-radius:10px;
    outline:none;
}

/* ================= GAME ================= */

#gamePage{
    display:none;
    padding:20px;
    margin-left:300px;
}

.card{
    background:#11182d;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,191,255,0.3);
}

button{
    padding:12px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:5px;
    font-weight:bold;
}

.action{
    background:#00bfff;
    color:black;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:rgba(10,15,35,0.95);
    border-right:1px solid rgba(0,255,255,0.3);
    box-shadow:0 0 25px rgba(0,255,255,0.2);
    backdrop-filter:blur(10px);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:20px;
}

.logo h2{
    margin:0;
    font-size:28px;
    color:#00ffff;
    text-shadow:0 0 10px cyan;
}

.logo span{
    font-size:12px;
    color:#7aa2ff;
}

.menu{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu-btn{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,255,0.2);
    color:white;
    padding:14px;
    border-radius:15px;
    cursor:pointer;
    font-size:16px;
    text-align:left;
    transition:0.3s;
    display:flex;
    align-items:center;
    gap:10px;
}

.menu-btn:hover{
    background:rgba(0,255,255,0.15);
    transform:translateX(5px);
    box-shadow:0 0 15px cyan;
}

.menu-btn.active{
    background:linear-gradient(
        90deg,
        rgba(0,255,255,0.3),
        rgba(0,100,255,0.3)
    );
    border:1px solid cyan;
    box-shadow:0 0 20px cyan;
}

.player-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    border:2px solid cyan;
    box-shadow:0 0 20px cyan;
}

.player-box h3{
    margin:10px 0 5px;
}

.player-box p{
    color:#00ffff;
    font-size:14px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

#gamePage{
    margin-left:0;
}

}

</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

    <div>

        <div class="logo">
            <h2>NEXORA</h2>
            <span>CRYPTO MINING</span>
        </div>

        <div class="menu">

            <button class="menu-btn active">
                🏠 Home
            </button>

            <button class="menu-btn">
                ⛏️ Mining
            </button>

            <button class="menu-btn">
                📈 Market
            </button>

            <button class="menu-btn">
                💰 Wallet
            </button>

            <button class="menu-btn">
                🖼️ NFT Rig
            </button>

            <button class="menu-btn">
                🏆 Leaderboard
            </button>

            <button class="menu-btn">
                ⚔️ Clan
            </button>

            <button class="menu-btn">
                ⚙️ Settings
            </button>

        </div>

    </div>

    <div class="player-box">

        <img
        src="https://i.imgur.com/8Km9tLL.png"
        class="avatar">

        <h3>ABI MINER</h3>

        <p>Quantum Rank</p>

    </div>

</div>

<!-- ================= LOGIN PAGE ================= -->

<div id="loginPage">

<h1>NEXORA LOGIN</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button
class="action"
onclick="loginEmail()">

Login Email

</button>

<button
class="action"
onclick="registerEmail()">

Register

</button>

<button
class="action"
onclick="loginGoogle()"
style="background:white;color:black">

Login Google

</button>

</div>

<!-- ================= GAME PAGE ================= -->

<div id="gamePage">

<div class="topbar">

<h2>NEXORA PRO</h2>

<div>

<div>
🪙 Total:
<span id="totalSupply">1000000</span>
NXR
</div>

<div>
⛏ Remaining:
<span id="remainingSupply">1000000</span>
NXR
</div>

<div>
💰 Mined:
<span id="minedSupply">0</span>
NXR
</div>

<div>
👤
<span id="playerName">
Player
</span>
</div>

</div>

</div>

<div>

<button
class="action"
onclick="savePlayer()">

💾 Save

</button>

<button onclick="logout()">

🚪 Logout

</button>

</div>

<div class="card">
💰 NXR:
<span id="nxr">0</span>
</div>

<div class="card">
⚡ Power:
<span id="power">1</span> H/s
</div>

<div class="card">
🏆 Level:
<span id="level">1</span>
</div>

<div class="card">
💵 Balance:
<span id="balance">1000</span>
</div>

<div class="card">
⚡ Electricity:
<span id="electricity">0</span>
</div>

<div class="card">
🛠 Durability:
<span id="durability">100</span>%
</div>

<div class="card">
🖥 Rig Level:
<span id="rigLevel">1</span>
</div>

<button
class="action"
onclick="repairRig()">

🛠 Repair Rig

</button>

<button
class="action"
onclick="mine()">

⛏️ MINE

</button>

</div>

<script>

// ================= FIREBASE CONFIG =================

const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain: "YOUR_PROJECT.firebaseapp.com",

  databaseURL:
  "https://YOUR_PROJECT-default-rtdb.firebaseio.com",

  projectId: "YOUR_PROJECT",

  storageBucket:
  "YOUR_PROJECT.appspot.com",

  messagingSenderId: "123456789",

  appId: "APP_ID"

};

// ================= INIT FIREBASE =================

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const auth = firebase.auth();

// ================= VARIABLES =================

let playerId = null;

let playerName = "Player";

let nxr = 0;

let power = 1;

let level = 1;

let totalSupply = 1000000;

let minedSupply = 0;

let remainingSupply = totalSupply;

let balance = 1000;

let electricity = 0;

let durability = 100;

let rigLevel = 1;

// ================= LOGIN GOOGLE =================

function loginGoogle(){

const provider =
new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)

.then(res=>{

playerId = res.user.uid;

playerName = res.user.displayName;

startGame();

})

.catch(err=>{

alert(err.message);

});

}

// ================= REGISTER =================

function registerEmail(){

auth.createUserWithEmailAndPassword(
email.value,
password.value
)

.then(res=>{

playerId = res.user.uid;

playerName = res.user.email;

startGame();

})

.catch(err=>{

alert(err.message);

});

}

// ================= LOGIN =================

function loginEmail(){

auth.signInWithEmailAndPassword(
email.value,
password.value
)

.then(res=>{

playerId = res.user.uid;

playerName = res.user.email;

startGame();

})

.catch(err=>{

alert(err.message);

});

}

// ================= START GAME =================

function startGame(){

document.getElementById(
"loginPage"
).style.display="none";

document.getElementById(
"gamePage"
).style.display="block";

document.getElementById(
"playerName"
).innerText = playerName;

loadPlayer();

loadMarket();

}

// ================= LOAD PLAYER =================

function loadPlayer(){

db.ref("players/"+playerId)

.once("value")

.then(snap=>{

if(snap.exists()){

let d = snap.val();

nxr = d.nxr || 0;

power = d.power || 1;

level = d.level || 1;

balance = d.balance || 1000;

electricity = d.electricity || 0;

durability = d.durability || 100;

rigLevel = d.rigLevel || 1;

}

updateUI();

});

}

// ================= LOAD MARKET =================

function loadMarket(){

db.ref("market")

.on("value",(snap)=>{

if(snap.exists()){

const data = snap.val();

minedSupply =
data.minedSupply || 0;

remainingSupply =
data.remainingSupply || totalSupply;

updateUI();

}

});

}

// ================= MANUAL MINE =================

function mine(){

if(durability <= 0){

alert("Rig rusak");

return;

}

let mined = power;

nxr += mined;

minedSupply += mined;

remainingSupply =
totalSupply - minedSupply;

durability -= 0.5;

updateUI();

savePlayer();

}

// ================= UPDATE UI =================

function updateUI(){

document.getElementById(
"totalSupply"
).innerText =
Math.floor(totalSupply);

document.getElementById(
"remainingSupply"
).innerText =
Math.floor(remainingSupply);

document.getElementById(
"minedSupply"
).innerText =
Math.floor(minedSupply);

document.getElementById(
"nxr"
).innerText =
nxr.toFixed(2);

document.getElementById(
"power"
).innerText =
power;

document.getElementById(
"level"
).innerText =
level;

document.getElementById(
"balance"
).innerText =
balance.toFixed(2);

document.getElementById(
"electricity"
).innerText =
electricity.toFixed(2);

document.getElementById(
"durability"
).innerText =
durability.toFixed(1);

document.getElementById(
"rigLevel"
).innerText =
rigLevel;

}

// ================= AUTO MINING =================

setInterval(()=>{

if(playerId && durability > 0){

let mined = power * 0.1;

let electricCost =
power * 0.02;

if(balance <= electricCost){
    return;
}

nxr += mined;

minedSupply += mined;

remainingSupply =
totalSupply - minedSupply;

balance -= electricCost;

electricity += electricCost;

durability -= 0.05;

updateUI();

savePlayer();

}

},1000);

// ================= REPAIR =================

function repairRig(){

if(balance >= 100){

balance -= 100;

durability = 100;

alert("Rig repaired");

updateUI();

savePlayer();

}else{

alert("Balance tidak cukup");

}

}

// ================= SAVE =================

function savePlayer(){

db.ref("players/"+playerId).set({

name:playerName,

nxr:nxr,

power:power,

level:level,

balance:balance,

electricity:electricity,

durability:durability,

rigLevel:rigLevel,

online:true

});

db.ref("market").update({

minedSupply:minedSupply,

remainingSupply:remainingSupply

});

}

// ================= LOGOUT =================

function logout(){

auth.signOut().then(()=>{

location.reload();

});

}

</script>

</body>
</html>

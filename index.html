<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>NEXORA</h2>
<p>Crypto Arena</p>

<div class="menu">
<button onclick="showPage('home')">🏠 Home</button>
<button onclick="showPage('mining')">⛏ Mining</button>
<button onclick="showPage('market')">📈 Market</button>
<button onclick="showPage('wallet')">💼 Wallet</button>
</div>
</div>

<!-- LOGIN -->
<div id="loginPage">
<h2>NEXORA LOGIN</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="action" onclick="loginEmail()">Login</button>
<button class="action" onclick="registerEmail()">Register</button>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="page">

<div class="hero">
<h2>🔥 Nexora Arena</h2>
<p>Player: <span id="playerName">Player</span></p>
</div>

<div class="hud">
<div>💰 NXR<br><span id="nxr">0</span></div>
<div>💵 Balance<br><span id="balance">1000</span></div>
</div>

</div>

<!-- MINING PAGE -->
<div id="miningPage" class="page">
<div class="card">
<h3>⛏ Mining</h3>
<button class="action" onclick="mine()">START MINING</button>
</div>
</div>

<!-- MARKET PAGE -->
<div id="marketPage" class="page">
<div class="card">
<h3>📈 Market</h3>
<p>Market coming soon...</p>
</div>
</div>

<!-- WALLET PAGE -->
<div id="walletPage" class="page">
<div class="card">
<h3>💼 Wallet</h3>
<p>Balance: <span id="balance2">1000</span></p>
</div>
</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

let nxr = 0;
let balance = 1000;

// NAVIGATION
function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display = "none";
});

document.getElementById(page + "Page").style.display = "block";

}

// LOGIN
function loginEmail(){

document.getElementById("loginPage").style.display = "none";

showPage("home");

}

// REGISTER
function registerEmail(){

document.getElementById("loginPage").style.display = "none";

showPage("home");

}

// MINING
function mine(){

nxr += 1;
balance -= 1;

document.getElementById("nxr").innerText = nxr;
document.getElementById("balance").innerText = balance;
document.getElementById("balance2").innerText = balance;

}

</script>

</body>

<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora v1</title>

<!-- GOOGLE FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1020;
color:white;
overflow-x:hidden;
display:flex;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#111827;
padding:20px;
border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h2{
color:#00f5ff;
margin-bottom:5px;
}

.sidebar p{
opacity:0.7;
font-size:14px;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
padding:15px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.menu button:hover{
background:#00f5ff;
color:black;
}

/* MAIN */

.main{
margin-left:220px;
width:100%;
padding:20px;
}

/* LOGIN */

.login-page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b1020;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.login-box{
width:90%;
max-width:350px;
background:#151d35;
padding:30px;
border-radius:20px;
}

.login-title{
text-align:center;
font-size:28px;
margin-bottom:20px;
color:#00f5ff;
}

.input-box{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1f2947;
color:white;
font-size:15px;
}

.login-btn{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#00f5ff;
color:black;
font-weight:600;
cursor:pointer;
}

/* PAGE */

.page{
display:none;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#16213e,#1f4068);
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,255,255,0.1);
}

.hero h2{
margin-bottom:10px;
}

/* HUD */

.hud{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.hud div{
background:#151d35;
padding:20px;
border-radius:20px;
text-align:center;
font-size:18px;
}

/* CARD */

.card{
background:#151d35;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.card h3{
margin-bottom:15px;
}

/* BUTTON */

.action{
padding:15px 20px;
border:none;
border-radius:12px;
background:#00f5ff;
color:black;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login-page" id="loginPage">

<div class="login-box">

<div class="login-title">
NEXORA
</div>

<input type="email" id="email" class="input-box" placeholder="Email">

<input type="password" id="password" class="input-box" placeholder="Password">

<button class="login-btn" onclick="loginEmail()">
LOGIN
</button>

<button class="login-btn" onclick="registerEmail()">
REGISTER
</button>

</div>

</div>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>NEXORA</h2>

<p>Crypto Arena</p>

<div class="menu">

<button onclick="showPage('home')">
🏠 Home
</button>

<button onclick="showPage('mining')">
⛏ Mining
</button>

<button onclick="showPage('market')">
📈 Market
</button>

<button onclick="showPage('wallet')">
💼 Wallet
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HOME -->

<div id="homePage" class="page">

<div class="hero">

<h2>🔥 Nexora Arena</h2>

<p>
Player:
<span id="playerName">
Player
</span>
</p>

</div>

<div class="hud">

<div>
💰 NXR
<br><br>
<span id="nxr">0</span>
</div>

<div>
💵 Balance
<br><br>
<span id="balance">1000</span>
</div>

</div>

</div>

<!-- MINING -->

<div id="miningPage" class="page">

<div class="card">

<h3>⛏ Mining Rig</h3>

<p id="miningStatus">
Status : Idle
</p>

<br>

<button class="action" onclick="mine()">
START MINING
</button>

</div>

</div>

<!-- MARKET -->

<div id="marketPage" class="page">

<div class="card">

<h3>📈 Market</h3>

<p>
NXR Price :
$1.25
</p>

</div>

</div>

<!-- WALLET -->

<div id="walletPage" class="page">

<div class="card">

<h3>💼 Wallet</h3>

<p>
Balance :
<span id="balance2">
1000
</span>
</p>

</div>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
databaseURL: "YOUR_DATABASE_URL",
projectId: "YOUR_PROJECT_ID"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* PLAYER DATA */

let currentUser = null;

let playerData = {

nxr: 0,
balance: 1000,
level: 1

};

/* NAVIGATION */

function showPage(page){

document.querySelectorAll(".page").forEach((p)=>{

p.style.display = "none";

});

document.getElementById(page + "Page").style.display = "block";

}

/* REGISTER */

function registerEmail(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(password.length < 6){

alert("Password minimal 6 karakter");
return;

}

auth.createUserWithEmailAndPassword(email,password)

.then((userCredential)=>{

currentUser = userCredential.user;

db.ref("users/" + currentUser.uid).set({

email: email,
nxr: 0,
balance: 1000,
level: 1

});

alert("Register berhasil");

})

.catch((error)=>{

alert(error.message);

});

}

/* LOGIN */

function loginEmail(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)

.then((userCredential)=>{

currentUser = userCredential.user;

alert("Login berhasil");

document.getElementById("loginPage").style.display = "none";

showPage("home");

})

.catch((error)=>{

alert(error.message);

});

}

/* AUTO LOGIN */

auth.onAuthStateChanged((user)=>{

if(user){

currentUser = user;

document.getElementById("loginPage").style.display = "none";

showPage("home");

loadPlayerData();

}else{

document.getElementById("loginPage").style.display = "flex";

}

});

/* LOAD DATA */

function loadPlayerData(){

db.ref("users/" + currentUser.uid)

.on("value",(snapshot)=>{

if(snapshot.exists()){

playerData = snapshot.val();

updateUI();

}

});

}

/* UPDATE UI */

function updateUI(){

document.getElementById("nxr").innerText =
playerData.nxr;

document.getElementById("balance").innerText =
playerData.balance;

document.getElementById("balance2").innerText =
playerData.balance;

document.getElementById("playerName").innerText =
currentUser.email;

}

/* SAVE DATA */

function saveData(){

db.ref("users/" + currentUser.uid)

.update({

nxr: playerData.nxr,
balance: playerData.balance,
level: playerData.level

});

}

/* MINING */

function mine(){

if(playerData.balance <= 0){

alert("Balance habis");
return;

}

playerData.nxr += 1;
playerData.balance -= 1;

document.getElementById("miningStatus").innerText =
"Status : Mining...";

updateUI();
saveData();

}

/* AUTO MINING */

setInterval(()=>{

if(currentUser){

playerData.nxr += 1;

updateUI();
saveData();

}

},5000);

/* LOGOUT */

function logout(){

auth.signOut();

}

/* START */

showPage("home");

</script>

</body>
  </html>

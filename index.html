<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Pro</title>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1f;
color:white;
}

/* LOGIN */
#loginPage{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
width:80%;
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

/* DASHBOARD */
#gamePage{
display:none;
padding:20px;
}

.card{
background:#11182d;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 0 10px rgba(0,191,255,0.3);
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.action{
background:#00bfff;
color:black;
font-weight:bold;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

/* SIDEBAR SIMPLE */
.menu{
display:flex;
gap:10px;
flex-wrap:wrap;
}
</style>
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage">

<h1>NEXORA LOGIN</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="action" onclick="loginEmail()">Login Email</button>
<button class="action" onclick="registerEmail()">Register</button>

<br><br>

<button class="action" onclick="loginGoogle()"
style="background:white;color:black">
Login Google
</button>

</div>

<!-- ================= GAME PAGE ================= -->
<div id="gamePage">

<div class="topbar">
  <div style="
text-align:right;
font-size:12px;
">

<div>
🪙 Total:
<span id="totalSupply">
1000000
</span>
NXR
</div>

<div>
⛏ Remaining:
<span id="remainingSupply">
2100000
</span>
NXR
</div>

<div>
💰 Mined:
<span id="minedSupply">
0
</span>
NXR
</div>

</div>
<h2>NEXORA PRO</h2>
<div>👤 <span id="playerName">Player</span></div>
</div>

<div class="menu">
<button class="action" onclick="savePlayer()">Save</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
💰 NXR: <span id="nxr">0</span>
</div>

<div class="card">
⚡ Power: <span id="power">1</span> H/s
</div>

<div class="card">
🏆 Level: <span id="level">1</span>
</div>
  <div class="card">
💵 Balance:
<span id="balance">1000</span>
</div>

<div class="card">
⚡ Electricity:
<span id="electricity">0</span>
</div>

<div class="card">
🛠 Durability:
<span id="durability">100</span>%
</div>

<div class="card">
🖥 Rig Level:
<span id="rigLevel">1</span>
</div>

<button
class="action"
onclick="repairRig()">

🛠 Repair Rig

</button>

<button class="action" onclick="mine()">MINE</button>

</div>

<script>

// ================= FIREBASE CONFIG =================
const firebaseConfig = {

  apiKey: "AIzaSyC5L5hxVSYOl_R5NH3Dnm-ta0L9pkfDN_w",

  authDomain: "nexora-35f82.firebaseapp.com",

  databaseURL:
  "https://nexora-35f82-default-rtdb.firebaseio.com",

  projectId: "nexora-35f82",

  storageBucket:
  "nexora-35f82.appspot.com",

  messagingSenderId: "10460502194",

  appId:
  "1:10460502194:web:5f00eb22b1caf2519191ab"

};

// ================= INIT FIREBASE =================
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const auth = firebase.auth();
  
  // ================= VARIABLES =================
let playerId = null;
let playerName = "Player";
let nxr = 0;
let power = 1;
let level = 1;

  // ================= GLOBAL MARKET =================
let totalSupply = 2100000;

let minedSupply = 0;

let remainingSupply = totalSupply;

  //================= NEW VARIABLES================
  let balance = 1000;

let electricity = 0;

let durability = 100;

let rigLevel = 1;

let rentCost = 50;

// ================= LOGIN GOOGLE =================
function loginGoogle(){

const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)
.then(res=>{

playerId = res.user.uid;
playerName = res.user.displayName;

startGame();

});

}

// ================= REGISTER EMAIL =================
function registerEmail(){

auth.createUserWithEmailAndPassword(
email.value,
password.value
)
.then(res=>{

playerId = res.user.uid;
playerName = res.user.email;

startGame();

});

}

// ================= LOGIN EMAIL =================
function loginEmail(){

auth.signInWithEmailAndPassword(
email.value,
password.value
)
.then(res=>{

playerId = res.user.uid;
playerName = res.user.email;

startGame();

});

}

// ================= START GAME =================
function startGame(){

document.getElementById("loginPage").style.display="none";
document.getElementById("gamePage").style.display="block";

document.getElementById("playerName").innerText = playerName;

loadPlayer();
loadMarket();
}

// ================= LOAD PLAYER =================
function loadPlayer(){
  balance = d.balance || 1000;

electricity =
d.electricity || 0;

durability =
d.durability || 100;

rigLevel =
d.rigLevel || 1;

db.ref("players/"+playerId).once("value")
.then(snap=>{

if(snap.exists()){

let d = snap.val();

nxr = d.nxr;
power = d.power;
level = d.level;

}

updateUI();

});

}

  // ================= LOAD MARKET =================
function loadMarket(){

db.ref("market")

.on("value",(snap)=>{

if(snap.exists()){

const data = snap.val();

minedSupply =
data.minedSupply || 0;

remainingSupply =
data.remainingSupply || totalSupply;

updateUI();

}

});

}


// ================= MINE =================
function mine(){

nxr += power;
updateUI();

}

// ================= UI UPDATE =================
function updateUI(){document.getElementById(
"totalSupply"
).innerText =
Math.floor(totalSupply);

document.getElementById(
"remainingSupply"
).innerText =
Math.floor(remainingSupply);

document.getElementById(
"minedSupply"
).innerText =
Math.floor(minedSupply);

document.getElementById(
"nxr"
).innerText = nxr;

document.getElementById(
"power"
).innerText = power;

document.getElementById(
"level"
).innerText = level;

document.getElementById(
"balance"
).innerText =
balance.toFixed(2);

document.getElementById(
"electricity"
).innerText =
electricity.toFixed(2);

document.getElementById(
"durability"
).innerText =
durability.toFixed(1);

document.getElementById(
"rigLevel"
).innerText =
rigLevel;

}
  // ================= AUTO MINING =================
setInterval(()=>{

if(playerId && durability > 0){

let mined = power * 0.1;

nxr += mined;
  minedSupply += mined;

remainingSupply =
totalSupply - minedSupply;

let electricCost =
power * 0.02;

balance -= electricCost;

durability -= 0.05;

electricity += electricCost;

updateUI();

savePlayer();

}

},1000);

  // ================= REPAIR RIG =================
function repairRig(){

if(balance >= 100){

balance -= 100;

durability = 100;

alert("Rig repaired");

updateUI();

savePlayer();

}else{

alert("Balance not enough");

}

}

  // ================= AUTO SAVE =================
function savePlayer(){

// SAVE PLAYER
db.ref("players/"+playerId).set({

name:playerName,

nxr:nxr,

power:power,

level:level,

balance:balance,

electricity:electricity,

durability:durability,

rigLevel:rigLevel,

online:true

});

// SAVE GLOBAL MARKET
db.ref("market").update({

minedSupply:minedSupply,

remainingSupply:remainingSupply

});

}

// ================= LOGOUT =================
function logout(){

auth.signOut().then(()=>{

location.reload();

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexora Mining Rig v1</title>
<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #0b0f1a;
        color: #fff;
        display: flex;
    }

    /* SIDEBAR */
    .sidebar {
        width: 220px;
        background: #11182a;
        height: 100vh;
        padding: 20px;
    }

    .logo {
        font-size: 20px;
        font-weight: bold;
        color: #00ffcc;
        margin-bottom: 30px;
    }

    .menu button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        background: #1b2742;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 8px;
    }

    .menu button:hover {
        background: #00ffcc;
        color: black;
    }

    /* MAIN */
    .main {
        flex: 1;
        padding: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }

    .card {
        background: #141c2f;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,255,204,0.1);
    }

    .status {
        font-size: 14px;
        margin-top: 10px;
    }

    .green {
        color: #00ffcc;
    }

    .red {
        color: #ff4d4d;
    }

    .btn {
        margin-top: 15px;
        padding: 10px 15px;
        border: none;
        cursor: pointer;
        border-radius: 8px;
        font-weight: bold;
    }

    .start {
        background: #00ffcc;
        color: black;
    }

    .stop {
        background: #ff4d4d;
        color: white;
    }

    .profit {
        font-size: 22px;
        color: #00ffcc;
        margin-top: 10px;
    }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">NEXORA</div>
    <div class="menu">
        <button>Home</button>
        <button>Mining</button>
        <button>Market</button>
        <button>Wallet</button>
        <button>NFT Rig</button>
        <button>Leaderboard</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <h2>⛏️ Mining Rig Dashboard</h2>

    <div class="grid">

        <!-- RIG STATUS -->
        <div class="card">
            <h3>Rig Alpha</h3>
            <div class="status">Power: <span id="power" class="red">OFF</span></div>
            <div class="status">Temperature: <span id="temp">45°C</span></div>
            <div class="status">Hashrate: <span id="hash">0 H/s</span></div>

            <button class="btn start" onclick="startMining()">START MINING</button>
            <button class="btn stop" onclick="stopMining()">STOP</button>
        </div>

        <!-- PROFIT -->
        <div class="card">
            <h3>Profit Realtime</h3>
            <div class="profit" id="profit">0 NXR</div>
            <div class="status">Est. per minute mining reward</div>
        </div>

    </div>
</div>

<script>
let mining = false;
let profit = 0;
let hash = 0;
let temp = 45;
let interval;

function startMining(){
    if(mining) return;
    mining = true;

    document.getElementById("power").innerText = "ON";
    document.getElementById("power").className = "green";

    interval = setInterval(() => {
        hash = Math.floor(Math.random() * 500 + 200);
        temp = Math.floor(Math.random() * 20 + 50);
        profit += Math.random() * 0.5;

        document.getElementById("hash").innerText = hash + " H/s";
        document.getElementById("temp").innerText = temp + "°C";
        document.getElementById("profit").innerText = profit.toFixed(3) + " NXR";
    }, 1000);
}

function stopMining(){
    mining = false;
    clearInterval(interval);

    document.getElementById("power").innerText = "OFF";
    document.getElementById("power").className = "red";

    document.getElementById("hash").innerText = "0 H/s";
}
</script>

</body>
</html>

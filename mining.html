<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexora Mining</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .topbar {
      padding: 15px;
      background: #111a2e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: #38bdf8;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #111a2e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
    }

    .big {
      font-size: 30px;
      font-weight: bold;
      color: #22c55e;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .mine {
      background: linear-gradient(90deg,#22c55e,#38bdf8);
      color: black;
    }

    .stop {
      background: #ef4444;
      color: white;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: #0f172a;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">⛏️ NEXORA MINING</div>
    <div>Active Miner</div>
  </div>

  <div class="container">

    <!-- STATUS -->
    <div class="card">
      <h3>Mining Status</h3>
      <div class="big" id="status">STOPPED</div>
      <p class="small">Reward otomatis tiap 1 detik saat aktif</p>
    </div>

    <!-- STATS -->
    <div class="card">
      <h3>📊 Stats</h3>
      <div class="grid">
        <div class="stat">
          <div>Balance NXR</div>
          <h2 id="balance">0</h2>
        </div>
        <div class="stat">
          <div>Energy</div>
          <h2 id="energy">100</h2>
        </div>
      </div>
    </div>

    <!-- MINING CONTROL -->
    <div class="card">
      <h3>⚙️ Control</h3>

      <button class="mine" onclick="startMining()">START MINING</button>
      <button class="stop" onclick="stopMining()">STOP MINING</button>

      <p class="small">+5 NXR / detik (demo system)</p>
    </div>

    <!-- HASHRATE -->
    <div class="card">
      <h3>⚡ Hashrate</h3>
      <div class="big" id="hashrate">0 H/s</div>
    </div>

  </div>

  <script>
    let balance = 0;
    let energy = 100;
    let mining = false;
    let interval;

    let hashrate = 0;

    function updateUI() {
      document.getElementById("balance").innerText = balance;
      document.getElementById("energy").innerText = energy;
      document.getElementById("hashrate").innerText = hashrate + " H/s";
    }

    function startMining() {
      if(mining) return;

      mining = true;
      document.getElementById("status").innerText = "MINING ACTIVE";

      hashrate = Math.floor(Math.random() * 10 + 5);

      interval = setInterval(() => {

        if(energy <= 0) {
          stopMining();
          alert("Energy habis!");
          return;
        }

        balance += 5;
        energy -= 2;

        updateUI();

      }, 1000);
    }

    function stopMining() {
      mining = false;
      document.getElementById("status").innerText = "STOPPED";
      clearInterval(interval);
    }

    updateUI();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexora Game Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #111a2e;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      color: #38bdf8;
      font-size: 20px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #111a2e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: #0f172a;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .mine-btn {
      background: linear-gradient(90deg,#22c55e,#38bdf8);
      color: black;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">⚡ NEXORA</div>
    <div id="user">Player</div>
  </div>

  <div class="container">

    <!-- WALLET -->
    <div class="card">
      <h3>💰 Wallet</h3>
      <div class="grid">
        <div class="stat">
          <div>NXR</div>
          <h2 id="balance">0</h2>
        </div>
        <div class="stat">
          <div>Level</div>
          <h2 id="level">1</h2>
        </div>
      </div>
    </div>

    <!-- MINING -->
    <div class="card">
      <h3>⛏️ Mining Panel</h3>
      <p class="small">Klik untuk mining NXR (manual system)</p>

      <button class="mine-btn" onclick="mine()">MINE NXR</button>

      <p class="small">+10 NXR per klik (demo system)</p>
    </div>

    <!-- XP -->
    <div class="card">
      <h3>📊 XP System</h3>
      <div class="grid">
        <div class="stat">
          <div>XP</div>
          <h2 id="xp">0</h2>
        </div>
        <div class="stat">
          <div>Status</div>
          <h2 id="status">Noob</h2>
        </div>
      </div>
    </div>

    <!-- NAV -->
    <div class="card">
      <h3>🔗 Menu</h3>
      <button onclick="alert('Market coming soon')">Market</button>
      <button onclick="alert('Leaderboard coming soon')">Leaderboard</button>
      <button onclick="reset()">Reset Data</button>
    </div>

  </div>

  <script>
    let balance = 0;
    let xp = 0;
    let level = 1;

    let username = localStorage.getItem("nexora_user") || "Player";

    document.getElementById("user").innerText = username;

    function updateUI() {
      document.getElementById("balance").innerText = balance;
      document.getElementById("xp").innerText = xp;
      document.getElementById("level").innerText = level;

      if(level < 5) document.getElementById("status").innerText = "Noob";
      else if(level < 10) document.getElementById("status").innerText = "Trader";
      else document.getElementById("status").innerText = "Pro Miner";
    }

    function mine() {
      balance += 10;
      xp += 5;

      if(xp >= 50) {
        level++;
        xp = 0;
      }

      updateUI();
    }

    function reset() {
      balance = 0;
      xp = 0;
      level = 1;
      updateUI();
    }

    updateUI();
  </script>

</body>
</html>

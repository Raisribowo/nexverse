<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexora Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .topbar {
      padding: 15px;
      background: #111a2e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: #38bdf8;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #111a2e;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .price {
      font-size: 28px;
      color: #22c55e;
      font-weight: bold;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .buy {
      background: #22c55e;
      color: black;
    }

    .sell {
      background: #ef4444;
      color: white;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">📈 NEXORA MARKET</div>
    <div>Live Trading</div>
  </div>

  <div class="container">

    <!-- PRICE -->
    <div class="card">
      <h3>💰 NXR Price</h3>
      <div class="price" id="price">1000</div>
      <p class="small">Update setiap klik (demo system)</p>

      <button onclick="updatePrice()">Refresh Price</button>
    </div>

    <!-- WALLET -->
    <div class="card">
      <h3>👛 Your Wallet</h3>
      <p>NXR Balance: <b id="balance">0</b></p>
    </div>

    <!-- BUY -->
    <div class="card">
      <h3>🟢 BUY NXR</h3>
      <input type="number" id="buyAmount" placeholder="Amount NXR">
      <button class="buy" onclick="buy()">BUY</button>
    </div>

    <!-- SELL -->
    <div class="card">
      <h3>🔴 SELL NXR</h3>
      <input type="number" id="sellAmount" placeholder="Amount NXR">
      <button class="sell" onclick="sell()">SELL</button>
    </div>

  </div>

  <script>
    let price = 1000;
    let balance = 0;

    function updateUI() {
      document.getElementById("price").innerText = price;
      document.getElementById("balance").innerText = balance;
    }

    function updatePrice() {
      // simulasi market naik turun
      let change = Math.floor(Math.random() * 200 - 100);
      price = Math.max(100, price + change);
      updateUI();
    }

    function buy() {
      let amount = parseInt(document.getElementById("buyAmount").value);

      if(!amount || amount <= 0) return alert("Masukkan jumlah!");

      let cost = amount * price;

      balance += amount;

      alert("Berhasil beli " + amount + " NXR");
      updateUI();
    }

    function sell() {
      let amount = parseInt(document.getElementById("sellAmount").value);

      if(!amount || amount <= 0) return alert("Masukkan jumlah!");

      if(amount > balance) return alert("Balance tidak cukup!");

      balance -= amount;

      alert("Berhasil jual " + amount + " NXR");
      updateUI();
    }

    updateUI();
  </script>

</body>
</html>

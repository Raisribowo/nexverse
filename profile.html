<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexora Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

.header {
    padding: 20px;
    text-align: center;
    background: #11182a;
    font-size: 20px;
    font-weight: bold;
    border-bottom: 1px solid #222;
}

.container {
    padding: 15px;
}

.profile-card {
    background: #151c2e;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    margin-bottom: 15px;
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #00ffb3;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 35px;
    font-weight: bold;
    color: #000;
}

.name {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
}

.username {
    font-size: 13px;
    color: #aaa;
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.stat-box {
    background: #0f1525;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
}

.stat-box h3 {
    margin: 0;
    font-size: 16px;
    color: #00ffb3;
}

.stat-box p {
    margin: 5px 0 0;
    font-size: 12px;
    color: #aaa;
}

.section {
    background: #151c2e;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.edit {
    background: #00c853;
    color: white;
}

.logout {
    background: #ff3d00;
    color: white;
}
</style>
</head>

<body>

<div class="header">
    👤 NEXORA PROFILE
</div>

<div class="container">

    <!-- PROFILE -->
    <div class="profile-card">
        <div class="avatar">A</div>
        <div class="name">Abi Player</div>
        <div class="username">@abi_nexora</div>

        <div class="stats">
            <div class="stat-box">
                <h3>1,250</h3>
                <p>NXR Balance</p>
            </div>

            <div class="stat-box">
                <h3>Lv. 7</h3>
                <p>Player Level</p>
            </div>

            <div class="stat-box">
                <h3>32</h3>
                <p>Mining Power</p>
            </div>

            <div class="stat-box">
                <h3>15</h3>
                <p>Referrals</p>
            </div>
        </div>
    </div>

    <!-- INFO -->
    <div class="section">
        <b>Email</b><br>
        abi@example.com
    </div>

    <div class="section">
        <b>Joined</b><br>
        2026 - Nexora Beta
    </div>

    <!-- ACTION -->
    <button class="btn edit" onclick="editProfile()">Edit Profile</button>
    <button class="btn logout" onclick="logout()">Logout</button>

</div>

<script>
function editProfile() {
    alert("Fitur edit profile akan terhubung ke database (Firebase / backend Nexora).");
}

function logout() {
    alert("Logout berhasil (nanti connect ke sistem login Nexora).");
}
</script>

</body>
</html>
